name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Syntax-check all sources
        run: |
          set -e
          for f in src/*.js src/lib/*.js tools/*.mjs test/*.mjs; do
            node --check "$f"
          done
      - name: Run compiler test suite
        run: node --test test/compiler.test.mjs
      - name: Validate JSON assets
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json'))"
          node -e "JSON.parse(require('fs').readFileSync('data/static-blocklist.json'))"
          node -e "JSON.parse(require('fs').readFileSync('data/domain-classification.json'))"
